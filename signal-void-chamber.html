<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Void Chamber | Lotus Labz</title>

  <style>
    :root {
      --white: rgba(255,255,255,0.92);
      --soft-white: rgba(255,255,255,0.45);
      --red: rgba(255, 35, 60, 0.72);
      --blue: rgba(80, 160, 255, 0.45);
      --field-x: 0px;
      --field-y: 0px;
      --field-scale: 1;
      --field-brightness: 1;
      --field-contrast: 1;
      --field-saturation: 1;
      --field-glow: 0.35;
      --field-haze: 0.18;
      --cursor-x: 50%;
      --cursor-y: 50%;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
      touch-action: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,255,255,.07), transparent 32%),
        radial-gradient(circle at 38% 52%, rgba(255,35,60,.12), transparent 42%),
        radial-gradient(circle at 62% 48%, rgba(80,160,255,.08), transparent 42%),
        linear-gradient(180deg, #020202, #000 48%, #030303);
      animation: voidBreath 9s ease-in-out infinite;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.016) 0px,
          rgba(255,255,255,.016) 1px,
          transparent 2px,
          transparent 5px
        );
      opacity: .34;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 10;
    }

    .stage {
      position: relative;
      z-index: 3;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: crosshair;
      background: #000;
      isolation: isolate;
    }

    .relic-wrap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0;
      transform:
        translate3d(var(--field-x), var(--field-y), 0)
        scale(calc(1.015 * var(--field-scale)));
      animation: arrival 2.2s ease forwards .2s;
      overflow: hidden;
      transition: opacity .4s ease;
      z-index: 2;
      will-change: transform, filter;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      filter:
        brightness(calc(.99 * var(--field-brightness)))
        contrast(calc(1.02 * var(--field-contrast)))
        saturate(calc(1.00 * var(--field-saturation)));
      opacity: .985;
      transform: scale(1.01);
      background: #000;
      will-change: filter;
    }

    .gesture-field {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background:
        radial-gradient(
          circle at var(--cursor-x) var(--cursor-y),
          rgba(255, 45, 65, calc(.15 * var(--field-glow))) 0%,
          rgba(255, 45, 65, calc(.08 * var(--field-glow))) 14%,
          transparent 38%
        ),
        radial-gradient(
          circle at var(--cursor-x) var(--cursor-y),
          rgba(120, 180, 255, calc(.10 * var(--field-glow))) 0%,
          transparent 28%
        );
      mix-blend-mode: screen;
      opacity: .9;
      transition: opacity .35s ease;
    }

    .haze {
      position: fixed;
      inset: -10%;
      z-index: 4;
      pointer-events: none;
      background:
        radial-gradient(circle at 35% 55%, rgba(255,35,60,var(--field-haze)), transparent 36%),
        radial-gradient(circle at 68% 42%, rgba(80,160,255,calc(var(--field-haze) * .7)), transparent 38%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,calc(var(--field-haze) * .26)), transparent 30%);
      filter: blur(54px);
      opacity: .72;
      transform: translate3d(calc(var(--field-x) * -.35), calc(var(--field-y) * -.35), 0);
      will-change: transform, opacity;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 0%, rgba(0,0,0,.10) 48%, rgba(0,0,0,.70) 100%),
        linear-gradient(to top, rgba(0,0,0,.56), transparent 46%),
        linear-gradient(to bottom, rgba(0,0,0,.46), transparent 38%);
      z-index: 7;
      pointer-events: none;
    }

    .brand {
      position: fixed;
      z-index: 12;
      left: 34px;
      top: 30px;
      color: rgba(255,255,255,.42);
      font-size: 11px;
      letter-spacing: .52em;
      text-transform: uppercase;
      user-select: none;
    }

    .exit {
      position: fixed;
      z-index: 12;
      right: 34px;
      top: 30px;
      color: rgba(255,255,255,.36);
      font-size: 11px;
      letter-spacing: .34em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color .35s ease;
    }

    .exit:hover { color: rgba(255,255,255,.8); }

    .transmission {
      position: fixed;
      z-index: 12;
      left: 50%;
      bottom: 92px;
      transform: translateX(-50%) translateY(8px);
      min-height: 20px;
      opacity: 0;
      color: rgba(255,255,255,.38);
      text-align: center;
      font-size: 11px;
      letter-spacing: .42em;
      text-transform: uppercase;
      transition: opacity .8s ease, transform .8s ease;
      pointer-events: none;
      white-space: nowrap;
      user-select: none;
    }

    .transmission.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hint {
      position: fixed;
      z-index: 12;
      left: 34px;
      bottom: 32px;
      color: rgba(255,255,255,.24);
      font-size: 10px;
      letter-spacing: .30em;
      text-transform: uppercase;
      user-select: none;
    }

    .status {
      position: fixed;
      z-index: 12;
      right: 34px;
      bottom: 32px;
      color: rgba(255,255,255,.28);
      font-size: 10px;
      letter-spacing: .35em;
      text-transform: uppercase;
      user-select: none;
    }

    .bottom-line {
      position: fixed;
      z-index: 12;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
    }

    .pulse-flash {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at var(--cursor-x) var(--cursor-y), rgba(255,255,255,.18), transparent 36%),
        radial-gradient(circle at center, rgba(255,35,60,.12), transparent 46%);
      opacity: 0;
      z-index: 9;
      pointer-events: none;
    }

    .pulse-flash.flash {
      animation: flash .8s ease-out;
    }

    .touch-orb {
      position: fixed;
      left: var(--cursor-x);
      top: var(--cursor-y);
      z-index: 11;
      width: 90px;
      height: 90px;
      border-radius: 999px;
      transform: translate(-50%, -50%) scale(.8);
      pointer-events: none;
      opacity: 0;
      border: 1px solid rgba(255,255,255,.16);
      box-shadow:
        0 0 44px rgba(255,35,60,.20),
        inset 0 0 38px rgba(255,255,255,.05);
      transition: opacity .28s ease, transform .28s ease;
    }

    .stage.interacting .touch-orb {
      opacity: .72;
      transform: translate(-50%, -50%) scale(1);
    }

    @keyframes voidBreath {
      0%, 100% { filter: brightness(.94) contrast(1.02); }
      50% { filter: brightness(1.04) contrast(1.06); }
    }

    @keyframes arrival {
      to { opacity: 1; }
    }

    @keyframes flash {
      0% { opacity: 0; }
      20% { opacity: .72; }
      100% { opacity: 0; }
    }

    @media (max-width: 700px) {
      .brand, .exit {
        font-size: 10px;
        letter-spacing: .28em;
      }

      .brand { left: 20px; top: 22px; }
      .exit { right: 20px; top: 22px; }

      .hint {
        left: 20px;
        right: 20px;
        bottom: 26px;
        line-height: 1.8;
      }

      .status { display: none; }

      .transmission {
        width: 90%;
        white-space: normal;
        letter-spacing: .28em;
      }

      .touch-orb {
        width: 76px;
        height: 76px;
      }
    }
  </style>
</head>

<body>
  <main class="stage" id="stage">
    <section class="relic-wrap" id="relic">
      <video
        id="relicVideo"
        src="assets/ring-interface-void.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
      ></video>
    </section>

    <div class="haze"></div>
    <div class="gesture-field"></div>
    <div class="touch-orb"></div>

    <div class="brand">Lotus Labz</div>
    <a class="exit" href="signal-void.html">Exit Void</a>

    <div class="transmission" id="transmission"></div>
    <div class="hint">Hover or drag to influence field // tap or click to pulse</div>
    <div class="status">Signal Relic // Gesture Field</div>
    <div class="bottom-line"></div>
    <div class="pulse-flash" id="flash"></div>
    <div class="vignette"></div>
  </main>

  <script>
    const stage = document.getElementById("stage");
    const video = document.getElementById("relicVideo");
    const transmission = document.getElementById("transmission");
    const flash = document.getElementById("flash");
    const root = document.documentElement;

    const messages = [
      "gesture field synchronized",
      "relic phase breathing",
      "machine memory cycling",
      "void artifact online",
      "energy lattice returning",
      "origin signal unknown",
      "the relic is listening",
      "touch pressure detected"
    ];

    let lastMessage = -1;
    let audioReady = false;
    let audioContext;
    let masterGain;
    let pulseGain;

    const state = {
      x: 0.5,
      y: 0.5,
      tx: 0.5,
      ty: 0.5,
      intensity: 0,
      targetIntensity: 0,
      speed: 0,
      lastX: 0.5,
      lastY: 0.5
    };

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function showTransmission(forceIndex = null) {
      let index = forceIndex ?? Math.floor(Math.random() * messages.length);
      if (index === lastMessage) index = (index + 1) % messages.length;
      lastMessage = index;

      transmission.textContent = messages[index];
      transmission.classList.add("visible");

      setTimeout(() => transmission.classList.remove("visible"), 4800);
    }

    setTimeout(showTransmission, 1200);
    setInterval(showTransmission, 9200);

    function updatePointer(clientX, clientY, active = true) {
      const x = clamp(clientX / window.innerWidth, 0, 1);
      const y = clamp(clientY / window.innerHeight, 0, 1);

      const dx = x - state.lastX;
      const dy = y - state.lastY;
      const velocity = clamp(Math.sqrt(dx * dx + dy * dy) * 16, 0, 1);

      state.tx = x;
      state.ty = y;
      state.speed = velocity;
      state.targetIntensity = active ? clamp(0.28 + velocity * 0.72, 0, 1) : 0.16;

      state.lastX = x;
      state.lastY = y;

      stage.classList.add("interacting");

      clearTimeout(window.gestureIdleTimeout);
      window.gestureIdleTimeout = setTimeout(() => {
        state.targetIntensity = 0;
        stage.classList.remove("interacting");
      }, 950);
    }

    function animateField() {
      state.x += (state.tx - state.x) * 0.075;
      state.y += (state.ty - state.y) * 0.075;
      state.intensity += (state.targetIntensity - state.intensity) * 0.065;

      const cx = state.x - 0.5;
      const cy = state.y - 0.5;
      const i = state.intensity;

      root.style.setProperty("--cursor-x", `${state.x * 100}%`);
      root.style.setProperty("--cursor-y", `${state.y * 100}%`);
      root.style.setProperty("--field-x", `${cx * 22 * i}px`);
      root.style.setProperty("--field-y", `${cy * 16 * i}px`);
      root.style.setProperty("--field-scale", `${1 + i * 0.018}`);
      root.style.setProperty("--field-brightness", `${1 + i * 0.10}`);
      root.style.setProperty("--field-contrast", `${1 + i * 0.045}`);
      root.style.setProperty("--field-saturation", `${1 + i * 0.08}`);
      root.style.setProperty("--field-glow", `${0.45 + i * 1.35}`);
      root.style.setProperty("--field-haze", `${0.12 + i * 0.18}`);

      requestAnimationFrame(animateField);
    }

    document.addEventListener("mousemove", (event) => {
      updatePointer(event.clientX, event.clientY, true);
    });

    document.addEventListener("touchstart", (event) => {
      if (!event.touches || !event.touches[0]) return;
      updatePointer(event.touches[0].clientX, event.touches[0].clientY, true);
    }, { passive: false });

    document.addEventListener("touchmove", (event) => {
      if (!event.touches || !event.touches[0]) return;
      updatePointer(event.touches[0].clientX, event.touches[0].clientY, true);
    }, { passive: false });

    document.addEventListener("touchend", () => {
      state.targetIntensity = 0;
      stage.classList.remove("interacting");
    });

    video.addEventListener("loadeddata", () => {
      video.playbackRate = 0.92;
      video.play().catch(() => {});
      showTransmission(0);
    });

    stage.addEventListener("click", () => {
      flash.classList.remove("flash");
      void flash.offsetWidth;
      flash.classList.add("flash");

      state.targetIntensity = 1;
      stage.classList.add("interacting");

      showTransmission(6);

      video.playbackRate = 1.03;
      setTimeout(() => video.playbackRate = 0.92, 900);

      if (audioReady) {
        pulseGain.gain.cancelScheduledValues(audioContext.currentTime);
        pulseGain.gain.setValueAtTime(0.002, audioContext.currentTime);
        pulseGain.gain.linearRampToValueAtTime(0.15, audioContext.currentTime + 0.08);
        pulseGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.8);
      }

      setTimeout(() => {
        state.targetIntensity = 0;
        stage.classList.remove("interacting");
      }, 900);
    });

    function initAudio() {
      if (audioReady) return;

      audioContext = new (window.AudioContext || window.webkitAudioContext)();

      masterGain = audioContext.createGain();
      masterGain.gain.value = 0.06;
      masterGain.connect(audioContext.destination);

      const drone = audioContext.createOscillator();
      drone.type = "sine";
      drone.frequency.value = 39;

      const droneGain = audioContext.createGain();
      droneGain.gain.value = 0.03;

      drone.connect(droneGain);
      droneGain.connect(masterGain);
      drone.start();

      const harmonic = audioContext.createOscillator();
      harmonic.type = "triangle";
      harmonic.frequency.value = 117;

      const harmonicGain = audioContext.createGain();
      harmonicGain.gain.value = 0.0065;

      harmonic.connect(harmonicGain);
      harmonicGain.connect(masterGain);
      harmonic.start();

      const lfo = audioContext.createOscillator();
      lfo.type = "sine";
      lfo.frequency.value = 0.055;

      const lfoGain = audioContext.createGain();
      lfoGain.gain.value = 0.015;

      lfo.connect(lfoGain);
      lfoGain.connect(droneGain.gain);
      lfo.start();

      const bufferSize = audioContext.sampleRate * 2;
      const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const output = noiseBuffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * 0.08;
      }

      const whiteNoise = audioContext.createBufferSource();
      whiteNoise.buffer = noiseBuffer;
      whiteNoise.loop = true;

      const filter = audioContext.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 330;

      const noiseGain = audioContext.createGain();
      noiseGain.gain.value = 0.009;

      whiteNoise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(masterGain);
      whiteNoise.start();

      pulseGain = audioContext.createGain();
      pulseGain.gain.value = 0.001;

      const pulseOsc = audioContext.createOscillator();
      pulseOsc.type = "sawtooth";
      pulseOsc.frequency.value = 63;

      pulseOsc.connect(pulseGain);
      pulseGain.connect(masterGain);
      pulseOsc.start();

      audioReady = true;
      showTransmission(7);
    }

    document.addEventListener("click", initAudio, { once: true });

    animateField();
  </script>
</body>
</html>

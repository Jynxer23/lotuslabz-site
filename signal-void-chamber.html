
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Void Chamber | Lotus Labz</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-void scanlines">
  <main class="chamber">
    <div class="brand-mark">Lotus Labz</div>
    <a class="back-link" href="signal-void.html">Exit Void</a>

    <section class="orb-stage" id="orbStage">
      <div class="orb-wrap" id="orb">
        <div class="orb-ring"></div>
        <div class="orb-ring two"></div>
        <div class="orb-ring three"></div>
        <div class="signal-core"></div>
      </div>
    </section>

    <div class="transmission" id="transmission"></div>

    <div class="hint">
      Click anywhere to initialize signal audio // click the signal
    </div>

    <div class="corner">Signal Void // Active</div>
    <div class="bottom-line"></div>
  </main>

  <script>
    const orbStage = document.getElementById("orbStage");
    const orb = document.getElementById("orb");
    const transmission = document.getElementById("transmission");

    const messages = [
      "carrier lock unstable",
      "memory bleed detected",
      "origin signal unknown",
      "frequency drift increasing",
      "signal integrity compromised",
      "echo pattern recognized",
      "the void is listening",
      "archive fragment unavailable"
    ];

    let lastMessage = -1;

    function showTransmission(forceIndex = null) {
      let index = forceIndex ?? Math.floor(Math.random() * messages.length);

      if (index === lastMessage) {
        index = (index + 1) % messages.length;
      }

      lastMessage = index;

      transmission.textContent = messages[index];
      transmission.classList.add("visible");

      setTimeout(() => {
        transmission.classList.remove("visible");
      }, 5200);
    }

    setTimeout(showTransmission, 1600);
    setInterval(showTransmission, 9200);

    document.addEventListener("mousemove", (event) => {
      const x = (event.clientX / window.innerWidth - 0.5) * 34;
      const y = (event.clientY / window.innerHeight - 0.5) * 34;

      orbStage.style.transform = `translate(${x}px, ${y}px)`;
    });

    orb.addEventListener("click", () => {
      orb.animate(
        [
          { transform: "scale(1)", filter: "brightness(1)" },
          { transform: "scale(1.08)", filter: "brightness(1.7) contrast(1.4)" },
          { transform: "scale(1)", filter: "brightness(1)" }
        ],
        { duration: 720, easing: "ease-out" }
      );

      showTransmission(6);

      if (audioReady) {
        pulseGain.gain.cancelScheduledValues(audioContext.currentTime);
        pulseGain.gain.setValueAtTime(0.02, audioContext.currentTime);
        pulseGain.gain.linearRampToValueAtTime(0.12, audioContext.currentTime + 0.12);
        pulseGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.8);
      }
    });

    // =========================
    // SIGNAL VOID AUDIO SYSTEM
    // =========================

    let audioReady = false;
    let audioContext;
    let masterGain;
    let pulseGain;

    function initAudio() {
      if (audioReady) return;

      audioContext = new (window.AudioContext || window.webkitAudioContext)();

      masterGain = audioContext.createGain();
      masterGain.gain.value = 0.08;
      masterGain.connect(audioContext.destination);

      // low drone
      const drone = audioContext.createOscillator();
      drone.type = "sine";
      drone.frequency.value = 42;

      const droneGain = audioContext.createGain();
      droneGain.gain.value = 0.035;

      drone.connect(droneGain);
      droneGain.connect(masterGain);
      drone.start();

      // high texture
      const texture = audioContext.createOscillator();
      texture.type = "triangle";
      texture.frequency.value = 118;

      const textureGain = audioContext.createGain();
      textureGain.gain.value = 0.008;

      texture.connect(textureGain);
      textureGain.connect(masterGain);
      texture.start();

      // slow modulation
      const lfo = audioContext.createOscillator();
      lfo.type = "sine";
      lfo.frequency.value = 0.06;

      const lfoGain = audioContext.createGain();
      lfoGain.gain.value = 0.018;

      lfo.connect(lfoGain);
      lfoGain.connect(droneGain.gain);
      lfo.start();

      // filtered noise
      const bufferSize = audioContext.sampleRate * 2;
      const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const output = noiseBuffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * 0.12;
      }

      const whiteNoise = audioContext.createBufferSource();
      whiteNoise.buffer = noiseBuffer;
      whiteNoise.loop = true;

      const filter = audioContext.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 420;

      const noiseGain = audioContext.createGain();
      noiseGain.gain.value = 0.01;

      whiteNoise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(masterGain);
      whiteNoise.start();

      // pulse interaction gain
      pulseGain = audioContext.createGain();
      pulseGain.gain.value = 0.001;

      const pulseOsc = audioContext.createOscillator();
      pulseOsc.type = "sawtooth";
      pulseOsc.frequency.value = 66;

      pulseOsc.connect(pulseGain);
      pulseGain.connect(masterGain);
      pulseOsc.start();

      // subtle frequency drift
      setInterval(() => {
        drone.frequency.linearRampToValueAtTime(
          38 + Math.random() * 10,
          audioContext.currentTime + 8
        );

        texture.frequency.linearRampToValueAtTime(
          110 + Math.random() * 18,
          audioContext.currentTime + 8
        );
      }, 7000);

      audioReady = true;

      showTransmission(4);
    }

    document.addEventListener("click", initAudio, { once: true });
  </script>
</body>
</html>

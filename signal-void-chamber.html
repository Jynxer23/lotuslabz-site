<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Void Chamber | Lotus Labz</title>

  <style>
    :root {
      --white: rgba(255,255,255,0.92);
      --red: rgba(255, 35, 60, 0.72);
      --blue: rgba(80, 160, 255, 0.45);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,255,255,.08), transparent 30%),
        radial-gradient(circle at 38% 52%, rgba(255,35,60,.13), transparent 40%),
        radial-gradient(circle at 62% 48%, rgba(80,160,255,.10), transparent 40%),
        linear-gradient(180deg, #020202, #000 48%, #030303);
      animation: voidBreath 8s ease-in-out infinite;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.022) 0px,
          rgba(255,255,255,.022) 1px,
          transparent 2px,
          transparent 5px
        );
      opacity: .42;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 10;
    }

    .stage {
      position: relative;
      z-index: 3;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: crosshair;
      background: #000;
    }

    .relic-wrap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0;
      transform: scale(1.02);
      animation: arrival 2.2s ease forwards .2s;
      transition: filter .18s ease-out, transform .18s ease-out;
      overflow: hidden;
    }

    .relic-wrap.active {
      filter: brightness(1.08) contrast(1.05) saturate(1.06);
      transform: scale(1.03);
    }

    video {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      filter: brightness(.96) contrast(1.02) saturate(1);
      opacity: .97;
      transform: scale(1.018);
      transition: filter .35s ease, opacity .35s ease;
      background: #000;
    }

    .relic-wrap.active video {
      filter: brightness(1.04) contrast(1.07) saturate(1.06);
      opacity: 1;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 0%, rgba(0,0,0,.10) 48%, rgba(0,0,0,.72) 100%),
        linear-gradient(to top, rgba(0,0,0,.58), transparent 46%),
        linear-gradient(to bottom, rgba(0,0,0,.48), transparent 38%);
      z-index: 4;
      pointer-events: none;
    }

    .relic-glow {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 66vw;
      height: 66vw;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(255,255,255,.10), transparent 44%),
        radial-gradient(circle at 44% 50%, rgba(255,35,60,.20), transparent 44%),
        radial-gradient(circle at 58% 52%, rgba(80,160,255,.10), transparent 44%);
      filter: blur(78px);
      opacity: .36;
      animation: pulseGlow 5s ease-in-out infinite;
      pointer-events: none;
      z-index: 2;
      transition: opacity .22s ease, transform .22s ease;
    }

    .stage.active .relic-glow {
      opacity: .58;
      transform: translate(-50%, -50%) scale(1.04);
    }

    .brand {
      position: fixed;
      z-index: 12;
      left: 34px;
      top: 30px;
      color: rgba(255,255,255,.42);
      font-size: 11px;
      letter-spacing: .52em;
      text-transform: uppercase;
    }

    .exit {
      position: fixed;
      z-index: 12;
      right: 34px;
      top: 30px;
      color: rgba(255,255,255,.36);
      font-size: 11px;
      letter-spacing: .34em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color .35s ease;
    }

    .exit:hover { color: rgba(255,255,255,.8); }

    .transmission {
      position: fixed;
      z-index: 12;
      left: 50%;
      bottom: 92px;
      transform: translateX(-50%) translateY(8px);
      min-height: 20px;
      opacity: 0;
      color: rgba(255,255,255,.38);
      text-align: center;
      font-size: 11px;
      letter-spacing: .42em;
      text-transform: uppercase;
      transition: opacity .8s ease, transform .8s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .transmission.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hint {
      position: fixed;
      z-index: 12;
      left: 34px;
      bottom: 32px;
      color: rgba(255,255,255,.24);
      font-size: 10px;
      letter-spacing: .30em;
      text-transform: uppercase;
    }

    .status {
      position: fixed;
      z-index: 12;
      right: 34px;
      bottom: 32px;
      color: rgba(255,255,255,.28);
      font-size: 10px;
      letter-spacing: .35em;
      text-transform: uppercase;
    }

    .bottom-line {
      position: fixed;
      z-index: 12;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
    }

    .pulse-flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,.15), transparent 42%);
      opacity: 0;
      z-index: 8;
      pointer-events: none;
    }

    .pulse-flash.flash {
      animation: flash .72s ease-out;
    }

    @keyframes voidBreath {
      0%, 100% { filter: brightness(.92) contrast(1.02); }
      50% { filter: brightness(1.04) contrast(1.07); }
    }

    @keyframes arrival {
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: .30; transform: translate(-50%, -50%) scale(.98); }
      50% { opacity: .48; transform: translate(-50%, -50%) scale(1.04); }
    }

    @keyframes flash {
      0% { opacity: 0; }
      24% { opacity: .7; }
      100% { opacity: 0; }
    }

    @media (max-width: 700px) {
      .brand, .exit {
        font-size: 10px;
        letter-spacing: .28em;
      }

      .brand { left: 20px; top: 22px; }
      .exit { right: 20px; top: 22px; }

      .hint {
        left: 20px;
        right: 20px;
        bottom: 26px;
        line-height: 1.8;
      }

      .status { display: none; }

      .transmission {
        width: 90%;
        white-space: normal;
        letter-spacing: .28em;
      }
    }
  </style>
</head>

<body>
  <main class="stage" id="stage">
    <section class="relic-wrap" id="relic">
      <video
        id="relicVideo"
        src="assets/ring-interface-void.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
      ></video>
    </section>

    <div class="relic-glow" id="relicGlow"></div>
    <div class="brand">Lotus Labz</div>
    <a class="exit" href="signal-void.html">Exit Void</a>

    <div class="transmission" id="transmission"></div>

    <div class="hint">Move slowly to modulate signal // click to activate audio pulse</div>
    <div class="status">Signal Relic // Smooth Mode</div>
    <div class="bottom-line"></div>
    <div class="pulse-flash" id="flash"></div>
    <div class="vignette"></div>
  </main>

  <script>
    const stage = document.getElementById("stage");
    const relic = document.getElementById("relic");
    const video = document.getElementById("relicVideo");
    const transmission = document.getElementById("transmission");
    const flash = document.getElementById("flash");

    const messages = [
      "signal stabilized",
      "relic phase responding",
      "machine memory active",
      "void artifact online",
      "energy lattice awakening",
      "origin signal unknown",
      "the relic is listening",
      "smooth field synchronized"
    ];

    let lastMessage = -1;
    let audioReady = false;
    let audioContext;
    let masterGain;
    let pulseGain;

    let targetRate = 0.88;
    let currentRate = 0.88;
    let targetScale = 1;
    let currentScale = 1;

    function showTransmission(forceIndex = null) {
      let index = forceIndex ?? Math.floor(Math.random() * messages.length);
      if (index === lastMessage) index = (index + 1) % messages.length;
      lastMessage = index;

      transmission.textContent = messages[index];
      transmission.classList.add("visible");

      setTimeout(() => transmission.classList.remove("visible"), 4800);
    }

    setTimeout(showTransmission, 1200);
    setInterval(showTransmission, 9000);

    function handlePointer(clientX, clientY) {
      const x = Math.min(1, Math.max(0, clientX / window.innerWidth));
      const y = Math.min(1, Math.max(0, clientY / window.innerHeight));

      const centeredX = x - 0.5;
      const centeredY = y - 0.5;

      targetRate = 0.58 + x * 0.86;
      targetScale = 1.012 + Math.abs(centeredX) * 0.026 + Math.abs(centeredY) * 0.016;

      relic.style.transform = `translate(${centeredX * 24}px, ${centeredY * 18}px) scale(${targetScale})`;

      stage.classList.add("active");
      relic.classList.add("active");

      clearTimeout(window.relicIdleTimeout);
      window.relicIdleTimeout = setTimeout(() => {
        stage.classList.remove("active");
        relic.classList.remove("active");
        targetRate = 0.88;
      }, 780);
    }

    document.addEventListener("mousemove", (event) => {
      handlePointer(event.clientX, event.clientY);
    });

    document.addEventListener("touchmove", (event) => {
      if (!event.touches || !event.touches[0]) return;
      handlePointer(event.touches[0].clientX, event.touches[0].clientY);
    }, { passive: true });

    function smoothLoop() {
      currentRate += (targetRate - currentRate) * 0.045;

      if (video.readyState >= 2) {
        video.playbackRate = Math.min(1.45, Math.max(0.50, currentRate));
      }

      requestAnimationFrame(smoothLoop);
    }

    video.addEventListener("loadeddata", () => {
      video.playbackRate = 0.88;
      video.play().catch(() => {});
      requestAnimationFrame(smoothLoop);
      showTransmission(7);
    });

    stage.addEventListener("click", () => {
      flash.classList.remove("flash");
      void flash.offsetWidth;
      flash.classList.add("flash");

      showTransmission(6);

      targetRate = 1.32;
      setTimeout(() => targetRate = 0.88, 850);

      if (audioReady) {
        pulseGain.gain.cancelScheduledValues(audioContext.currentTime);
        pulseGain.gain.setValueAtTime(0.002, audioContext.currentTime);
        pulseGain.gain.linearRampToValueAtTime(0.15, audioContext.currentTime + 0.08);
        pulseGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.8);
      }
    });

    function initAudio() {
      if (audioReady) return;

      audioContext = new (window.AudioContext || window.webkitAudioContext)();

      masterGain = audioContext.createGain();
      masterGain.gain.value = 0.065;
      masterGain.connect(audioContext.destination);

      const drone = audioContext.createOscillator();
      drone.type = "sine";
      drone.frequency.value = 39;

      const droneGain = audioContext.createGain();
      droneGain.gain.value = 0.032;

      drone.connect(droneGain);
      droneGain.connect(masterGain);
      drone.start();

      const harmonic = audioContext.createOscillator();
      harmonic.type = "triangle";
      harmonic.frequency.value = 117;

      const harmonicGain = audioContext.createGain();
      harmonicGain.gain.value = 0.007;

      harmonic.connect(harmonicGain);
      harmonicGain.connect(masterGain);
      harmonic.start();

      const lfo = audioContext.createOscillator();
      lfo.type = "sine";
      lfo.frequency.value = 0.055;

      const lfoGain = audioContext.createGain();
      lfoGain.gain.value = 0.016;

      lfo.connect(lfoGain);
      lfoGain.connect(droneGain.gain);
      lfo.start();

      const bufferSize = audioContext.sampleRate * 2;
      const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const output = noiseBuffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * 0.09;
      }

      const whiteNoise = audioContext.createBufferSource();
      whiteNoise.buffer = noiseBuffer;
      whiteNoise.loop = true;

      const filter = audioContext.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 340;

      const noiseGain = audioContext.createGain();
      noiseGain.gain.value = 0.010;

      whiteNoise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(masterGain);
      whiteNoise.start();

      pulseGain = audioContext.createGain();
      pulseGain.gain.value = 0.001;

      const pulseOsc = audioContext.createOscillator();
      pulseOsc.type = "sawtooth";
      pulseOsc.frequency.value = 63;

      pulseOsc.connect(pulseGain);
      pulseGain.connect(masterGain);
      pulseOsc.start();

      setInterval(() => {
        drone.frequency.linearRampToValueAtTime(36 + Math.random() * 8, audioContext.currentTime + 7);
        harmonic.frequency.linearRampToValueAtTime(108 + Math.random() * 22, audioContext.currentTime + 7);
        filter.frequency.linearRampToValueAtTime(300 + Math.random() * 220, audioContext.currentTime + 7);
      }, 6500);

      audioReady = true;
      showTransmission(4);
    }

    document.addEventListener("click", initAudio, { once: true });
  </script>
</body>
</html>

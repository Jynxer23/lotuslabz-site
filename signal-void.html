<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Void | Lotus Labz</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-tunnel scanlines">
  <div class="signal-glow"></div>
  <div class="vignette"></div>

  <main class="shell" id="shell">
    <section class="content">
      <div class="status">Signal Detected</div>
      <h1>Lotus Labz</h1>
      <div class="line"></div>
      <p class="subtitle">
        A cinematic audiovisual threshold where signal, atmosphere, and machine-born visuals converge.
      </p>

      <div class="actions">
        <button class="btn" id="enterBtn">Enter Signal Void</button>
        <a class="btn secondary" href="/">Return to Hub</a>
      </div>
    </section>
  </main>

  <div class="corner">Signal Stability // Nominal</div>
  <div class="bottom-line"></div>

  <script>
    const shell = document.getElementById("shell");
    const enterBtn = document.getElementById("enterBtn");

    document.addEventListener("mousemove", (event) => {
      const x = (event.clientX / window.innerWidth - 0.5) * 10;
      const y = (event.clientY / window.innerHeight - 0.5) * 10;
      shell.style.transform = `translate(${x}px, ${y}px)`;
    });

    enterBtn.addEventListener("click", () => {
      document.body.classList.add("entering");
      setTimeout(() => {
        window.location.href = "signal-void-chamber.html";
      }, 1050);
    });
  </script>
</body>
</html>

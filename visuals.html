<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Archive | Lotus Labz</title>
<style>
body{background:#05070b;color:white;font-family:Arial,sans-serif;margin:0;padding:0}
header{padding:20px;background:#000;border-bottom:1px solid #222}
.video-card{max-width:1100px;margin:40px auto;background:#0d1117;border:1px solid #222;border-radius:20px;overflow:hidden}
.video-frame{aspect-ratio:16/9}
.video-frame iframe{width:100%;height:100%}
.video-info{padding:24px}
.video-meta{color:#ff1820;font-size:.8rem;text-transform:uppercase;font-weight:bold}
.local-video-wrap video{width:100%;display:block;background:black}
</style>
</head>
<body>

<header>
<h1>Lotus Labz — Video Archive</h1>
</header>

<section id="projection">

<div class="video-card">

<div class="local-video-wrap">

<video
controls
playsinline
preload="metadata"
poster="artwork/thumbs/redmonkey-main-flyer-thumb.jpg"
>
<source src="media/redmonkey-projection-visuals.mp4" type="video/mp4">
</video>

</div>

<div class="video-info">

<div class="video-meta">
Venue Projection Visuals
</div>

<h2>RedMonkey Projection Visuals</h2>

<p>
Projection visuals created for Pete Salaz / RedMonkey.
</p>

</div>

</div>

</section>

</body>
</html>
